<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Forgot Password - Life Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="auth-page" id="top">

    <div class="auth-card glass-panel">
        <h2>Forgot Password</h2>
        <p class="auth-subtitle">Enter your email to receive a password reset link.</p>

        <input type="email" id="forgotEmail" placeholder="Email Address">

        <button class="btn-primary full-btn" style="width: 100%; margin-top: 10px;" onclick="forgotPassword()">Send
            Reset Link</button>

        <p id="forgotMessage" class="auth-message" style="margin-top: 15px;"></p>

        <a href="login.html" class="auth-link" style="display: block; margin-top: 20px; text-align: center;">Back to
            Login</a>
    </div>

    <!-- Footer -->
    <footer class="footer glass-panel">
        <p>&copy; 2026 Life Log. All rights reserved. | <a href="#top"
                style="color: var(--neon-cyan); text-decoration: none;">Back to top</a></p>
    </footer>

    <script src="js/auth.js"></script>

</body>

</html>
